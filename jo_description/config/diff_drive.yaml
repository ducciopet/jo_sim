controller_manager:
  ros__parameters:
    update_rate: 200
    use_sim_time: True

    diff_cont:
      type: diff_drive_controller/DiffDriveController

    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_cont:
  ros__parameters:

    publish_rate: 100.0
    use_sim_time: True

    base_frame_id: base_link
    enable_odom_tf: False

    left_wheel_names:
      - left_wheel_center_joint
      - left_wheel_front_joint
      - left_wheel_back_joint
    right_wheel_names:
      - right_wheel_center_joint
      - right_wheel_front_joint
      - right_wheel_back_joint
    wheel_separation: 0.545
    wheel_radius: 0.1
