# ROS cmd_vel → Gz diff drive plugin topic
- ros_topic_name: "/turtlebot/cmd_vel"
  gz_topic_name: "/model/turtlebot/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# Gz joint states → ROS (for robot_state_publisher)
- ros_topic_name: "/turtlebot/joint_states"
  gz_topic_name: "/model/turtlebot/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

# Gz odometry → ROS (for obstacle publisher velocity)
- ros_topic_name: "/turtlebot/odom"
  gz_topic_name: "/model/turtlebot/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# Ground-truth world-frame pose from OdometryPublisher (physics ECM)
- ros_topic_name: "/turtlebot/world_odom"
  gz_topic_name: "/model/turtlebot/world_odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# Ground-truth world-frame pose array (OdometryPublisher, physics ECM)
- ros_topic_name: "/turtlebot/world_pose"
  gz_topic_name: "/model/turtlebot/pose"
  ros_type_name: "geometry_msgs/msg/PoseArray"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

# Gz diff-drive TF → ROS /tf
# Publishes turtlebot/odom → turtlebot/base_footprint.
# Combined with the static "world → turtlebot/odom" TF (at turtlebot spawn),
# and the static "world → odom" TF (at Jo spawn), gives the full chain:
# odom ← world → turtlebot/odom → turtlebot/base_footprint
- ros_topic_name: "/tf"
  gz_topic_name: "/model/turtlebot/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS
